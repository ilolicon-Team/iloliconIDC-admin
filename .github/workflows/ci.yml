name: ilolicon_idc

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Deploy
        uses: actions/deploy-artifact@v2
        with:
          artifact_path: target/release/ilolicon_idc
